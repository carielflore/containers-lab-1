apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-sql
  labels:
    lab: lab3
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
        id SERIAL PRIMARY KEY,
        name TEXT NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    INSERT INTO users (name) VALUES
    ('Kubernetes Beginner'),
    ('Pod Master'),
    ('DevOps Engineer')
    ON CONFLICT DO NOTHING;
