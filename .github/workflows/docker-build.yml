name: Build and Push Docker Images

on:
  push:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      # Build and push Go app
      - id: meta-go
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Go app
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta-go.outputs.tags }}
          labels: ${{ steps.meta-go.outputs.labels }}

      # Build and push Nginx
      - id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/nginx
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}

      # Wait for images to be available
      - name: Wait for images
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "Waiting for images with tag: sha-${SHORT_SHA}"
          
          for image in app nginx; do
            echo "Checking $image..."
            for i in {1..12}; do
              if docker manifest inspect ghcr.io/${{ github.repository }}/$image:sha-${SHORT_SHA} > /dev/null 2>&1; then
                echo "✅ $image available"
                break
              fi
              echo "⏳ Attempt $i/12, waiting 5s..."
              sleep 5
              if [ $i -eq 12 ]; then
                echo "❌ $image not available after 60s"
                exit 1
              fi
            done
          done

      # Test with the specific SHA tag
      - name: Test images
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          
          cat > docker-compose.test.yml << EOF
          services:
            postgres:
              image: postgres:15-alpine
              environment:
                POSTGRES_PASSWORD: secret
                POSTGRES_DB: myapp_test
            app:
              image: ghcr.io/${{ github.repository }}/app:sha-${SHORT_SHA}
              environment:
                DB_HOST: postgres
                DB_PASSWORD: secret
                DB_NAME: myapp_test
              depends_on:
                - postgres
            nginx:
              image: ghcr.io/${{ github.repository }}/nginx:sha-${SHORT_SHA}
              ports:
                - "80:80"
              depends_on:
                - app
          EOF
          
          docker compose -f docker-compose.test.yml up -d
          sleep 20
          curl -f http://localhost/api/health
          docker compose -f docker-compose.test.yml down
