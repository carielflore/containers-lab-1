name: Build and Push Docker Images

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract metadata for Go app
        id: meta-go
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Go app
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-go.outputs.tags }}
          labels: ${{ steps.meta-go.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for Nginx
        id: meta-nginx
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/nginx
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha

      - name: Build and push Nginx
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: ${{ steps.meta-nginx.outputs.tags }}
          labels: ${{ steps.meta-nginx.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Test the built images
        env:
          APP_IMAGE: ghcr.io/${{ github.repository }}/app:sha-${{ github.sha }}
          NGINX_IMAGE: ghcr.io/${{ github.repository }}/nginx:sha-${{ github.sha }}
        run: |
          # Создаем временный docker-compose файл с подставленными значениями
          cat > docker-compose.test.yml << EOF
          version: '3.8'
          services:
            postgres:
              image: postgres:15-alpine
              environment:
                POSTGRES_PASSWORD: secret
                POSTGRES_DB: myapp_test
              networks:
                - test-network
            app:
              image: ${APP_IMAGE}
              environment:
                DB_HOST: postgres
                DB_PASSWORD: secret
                DB_NAME: myapp_test
              depends_on:
                - postgres
              networks:
                - test-network
            nginx:
              image: ${NGINX_IMAGE}
              ports:
                - "80:80"
              depends_on:
                - app
              networks:
                - test-network
          networks:
            test-network:
          EOF
          
          echo "Starting test environment..."
          docker compose -f docker-compose.test.yml up -d
          
          echo "Waiting for services to start..."
          sleep 30
          
          echo "Checking health endpoint..."
          curl -f http://localhost/api/health || exit 1
          
          echo "Checking users endpoint..."
          curl -f http://localhost/api/users || exit 1
          
          echo "✅ Tests passed! Stopping containers..."
          docker compose -f docker-compose.test.yml down
