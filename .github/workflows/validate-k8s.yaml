name: Validate Kubernetes Manifests

on:
  push:
    paths:
      - 'k8s/*.yaml'
  pull_request:
    paths:
      - 'k8s/*.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Validate YAML syntax
      run: |
        for file in k8s/*.yaml; do
          echo "Checking $file"
          python3 -c "import yaml; yaml.safe_load(open('$file'))"
        done
