name: Validate Kubernetes Manifests

on:
  push:
    paths:
      - 'k8s/*.yaml'
      - '.github/workflows/validate-k8s.yaml'
  pull_request:
    paths:
      - 'k8s/*.yaml'
      - '.github/workflows/validate-k8s.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install kubeval
      run: |
        wget https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
        tar xf kubeval-linux-amd64.tar.gz
        sudo cp kubeval /usr/local/bin
        kubeval --version

    - name: Validate with kubeval
      run: |
        for file in k8s/*.yaml; do
          echo "📄 Validating $file"
          kubeval --strict --ignore-missing-schemas $file
        done

    - name: Install kubeconform (альтернатива kubeval)
      run: |
        wget https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz
        tar xf kubeconform-linux-amd64.tar.gz
        sudo cp kubeconform /usr/local/bin
        kubeconform -version

    - name: Validate with kubeconform
      run: |
        for file in k8s/*.yaml; do
          echo "📄 Validating $file with kubeconform"
          kubeconform -strict -ignore-missing-schemas $file
        done

    - name: Check YAML syntax
      run: |
        for file in k8s/*.yaml; do
          echo "📄 Checking YAML syntax: $file"
          python3 -c "import yaml; yaml.safe_load(open('$file'))" || exit 1
        done
        echo "✅ All YAML files have valid syntax"
