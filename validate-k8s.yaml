name: Validate Kubernetes Manifests

on:
  push:
    paths:
      - 'k8s/*.yaml'
      - '.github/workflows/validate-k8s.yaml'
  pull_request:
    paths:
      - 'k8s/*.yaml'
      - '.github/workflows/validate-k8s.yaml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install kubeval
      run: |
        wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
        tar xf kubeval-linux-amd64.tar.gz
        sudo cp kubeval /usr/local/bin

    - name: Validate with kubeval
      run: |
        for file in k8s/*.yaml; do
          echo "Validating $file"
          kubeval --strict --ignore-missing-schemes --kubernetes-version 1.28.0 $file
        done
